<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search Users</title>
  <link rel="stylesheet" href="css/style.css?v=0.2.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Dark overlay for readability */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .search-app-container {
      max-width: 600px;
      width: 90%;
      margin: 20px auto;
      z-index: 10;
      position: relative;
    }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .search-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: white;
    }

    .btn-icon i {
      font-size: 1.1rem;
    }

    .btn-chat {
      color: var(--primary-color);
      border-color: rgba(0, 242, 254, 0.3);
    }
    
    .btn-chat:hover {
      background: rgba(0, 242, 254, 0.1);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      transform: translateY(-2px);
    }

    .btn-logout {
      color: var(--error-color);
      border-color: rgba(255, 51, 102, 0.3);
    }

    .btn-logout:hover {
      background: rgba(255, 51, 102, 0.1);
      box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
      transform: translateY(-2px);
    }

    /* Large Rounded Search Bar */
    .search-bar-wrapper {
      position: relative;
      margin-bottom: 30px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(15px);
      transition: all 0.4s ease;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .search-bar-wrapper:focus-within {
      border-color: var(--primary-color);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
      transform: scale(1.02);
    }

    .search-icon {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.2rem;
      transition: all 0.3s ease;
      z-index: 2;
    }

    .search-bar-wrapper:focus-within .search-icon {
      color: var(--primary-color);
      text-shadow: 0 0 10px var(--primary-color);
    }

    .search-clear {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      display: none;
      z-index: 2;
    }

    .search-clear:hover {
      color: var(--error-color);
      transform: translateY(-50%) scale(1.1);
    }

    .search-input {
      width: 100%;
      padding: 20px 50px 20px 60px;
      font-size: 1.1rem;
      color: white;
      background: transparent;
      border: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    
    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-glow {
      position: absolute;
      bottom: 0; left: 50%;
      width: 0; height: 2px;
      background: var(--primary-color);
      transition: all 0.4s ease;
      transform: translateX(-50%);
    }

    .search-bar-wrapper:focus-within .search-glow {
      width: 100%;
    }

    /* User Cards Container */
    .results-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      min-height: 200px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .results-container.active {
      display: block;
    }

    .section-title {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      margin-left: 10px;
    }

    /* User Cards */
    .user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      border-radius: 15px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .user-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--glass-border);
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: #050510;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
    }

    .btn-message {
      background: rgba(0, 242, 254, 0.1);
      color: var(--primary-color);
      border: 1px solid rgba(0, 242, 254, 0.2);
      border-radius: 50px;
      padding: 8px 15px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .user-card:hover .btn-message {
      background: var(--primary-color);
      color: #050510;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .no-results {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .no-results i {
      font-size: 2rem;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 35px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      text-align: center;
      position: relative;
      animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalSlide {
      from { transform: translateY(30px) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal-content h3 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-content p {
      color: var(--text-muted);
      margin-bottom: 25px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .modal-content p b {
      color: var(--primary-color);
      font-weight: 600;
    }

    .modal-input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      color: white;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      letter-spacing: 3px;
    }

    .modal-input:focus {
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
    }

    .modal-actions {
      display: flex;
      gap: 15px;
    }

    .btn-modal {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-verify {
      background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
      color: white;
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
    }

    .btn-verify:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(112, 0, 255, 0.5);
    }

    .btn-verify:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .modal-error {
      color: var(--error-color);
      font-size: 0.85rem;
      margin-top: -12px;
      margin-bottom: 20px;
      display: none;
      font-weight: 600;
      background: rgba(255, 51, 102, 0.1);
      padding: 8px;
      border-radius: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- SEARCH PAGE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      .search-app-container {
        width: 100%;
        margin: 10px auto;
        padding: 0 15px;
      }

      .search-title {
        font-size: 1.5rem;
      }

      .search-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .action-buttons {
        width: 100%;
        justify-content: space-between;
      }

      .search-bar-wrapper {
        margin-bottom: 20px;
      }

      .search-input {
        padding: 15px 45px 15px 55px;
        font-size: 1rem;
      }

      .search-icon, .search-clear {
        font-size: 1rem;
      }

      .section-title {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="search-app-container">
    <div class="search-header">
      <h2 class="search-title">Discover</h2>
      <div class="action-buttons">
        <button id="showCreateGroup" class="btn-icon btn-chat" title="Create Group">
          <i class="fas fa-plus-circle"></i> <span>Create Group</span>
        </button>
        <button id="showJoinGroup" class="btn-icon btn-chat" title="Join Group" style="color: var(--secondary-color); border-color: var(--secondary-color);">
          <i class="fas fa-sign-in-alt"></i> <span>Join Group</span>
        </button>
        <button onclick="logout()" class="btn-icon btn-logout">
          <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
      </div>
    </div>
    
    <div class="search-bar-wrapper">
      <i class="fas fa-search search-icon" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search by username..." autocomplete="off">
      <i class="fas fa-times-circle search-clear" id="searchClear"></i>
      <div class="search-glow"></div>
    </div>

    <!-- Group Chat Section -->
    <div class="search-section">
      <h3 class="section-title"><i class="fas fa-users"></i> My Groups</h3>
      <div id="groupsList" class="users-list">
        <!-- Groups will be loaded here -->
        <div class="no-results">
          <i class="fas fa-layer-group"></i>
          <div>Loading your groups...</div>
        </div>
      </div>
    </div>

    <!-- Recent Chats Section -->
    <div class="search-section">
      <h3 class="section-title" data-section="suggestions"><i class="fas fa-history"></i> Recent Chats</h3>
      <div id="suggestedList" class="users-list">
        <!-- Other users will be loaded here -->
      </div>
    </div>
    
    <!-- Search Results Area -->
    <div id="resultsArea" class="results-container">
      <div class="section-title">Search Results</div>
      <div id="searchResults" class="users-list"></div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div id="createGroupModal" class="modal-overlay">
    <div class="modal">
      <h2 class="modal-title">Create Private Group</h2>
      <div class="form-group">
        <label>Group Name</label>
        <input type="text" id="groupName" placeholder="Enter group name...">
      </div>
      <div class="form-group">
        <label>Secret Key</label>
        <input type="password" id="createGroupKey" placeholder="Set a group access key...">
      </div>
      <div class="modal-actions">
        <button id="cancelCreate" class="btn-cancel">Cancel</button>
        <button id="confirmCreate" class="btn-confirm">Create Group</button>
      </div>
    </div>
  </div>

  <!-- Join Group Modal -->
  <div id="joinGroupModal" class="modal-overlay">
    <div class="modal">
      <h2 class="modal-title">Join Existing Group</h2>
      <div class="form-group">
        <label>Group Name</label>
        <input type="text" id="joinGroupName" placeholder="Enter target group name...">
      </div>
      <div class="form-group">
        <label>Secret Key</label>
        <input type="password" id="joinGroupKey" placeholder="Enter the group's secret key...">
      </div>
      <div class="modal-actions">
        <button id="cancelJoin" class="btn-cancel">Cancel</button>
        <button id="confirmJoin" class="btn-confirm">Join Group</button>
      </div>
    </div>
  </div>

    </div>

  <!-- Verification Modal -->
  <div id="verificationModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Verify Access</h3>
      <p>Please enter the chat password for <br><b id="modalTargetName">User</b> to start the conversation.</p>
      
      <div id="modalError" class="modal-error">Invalid password. Please try again.</div>
      
      <div class="modal-input-wrapper">
        <input type="password" id="modalPassword" class="modal-input" placeholder="••••••••" autocomplete="off">
      </div>
      
      <div class="modal-actions">
        <button id="cancelVerify" class="btn-modal btn-cancel">Cancel</button>
        <button id="confirmVerify" class="btn-modal btn-verify">
          <i class="fas fa-shield-alt"></i> <span>Verify</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=0.2.0"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || !localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    let selectedUser = null;

    // Modal Elements
    const verificationModal = document.getElementById('verificationModal');
    const modalTargetName = document.getElementById('modalTargetName');
    const modalPassword = document.getElementById('modalPassword');
    const modalError = document.getElementById('modalError');
    const confirmVerify = document.getElementById('confirmVerify');
    const cancelVerify = document.getElementById('cancelVerify');

    // Group Modal Elements
    const createGroupModal = document.getElementById('createGroupModal');
    const joinGroupModal = document.getElementById('joinGroupModal');
    const showCreateGroup = document.getElementById('showCreateGroup');
    const showJoinGroup = document.getElementById('showJoinGroup');

    // Toggle Modals
    showCreateGroup.onclick = () => createGroupModal.classList.add('active');
    document.getElementById('cancelCreate').onclick = () => createGroupModal.classList.remove('active');
    showJoinGroup.onclick = () => joinGroupModal.classList.add('active');
    document.getElementById('cancelJoin').onclick = () => joinGroupModal.classList.remove('active');

    // Create Group Logic
    document.getElementById('confirmCreate').onclick = async () => {
      const name = document.getElementById('groupName').value.trim();
      const groupKey = document.getElementById('createGroupKey').value.trim();
      if (!name || !groupKey) return alert('Fill all fields');

      try {
        await fetchAPI('/groups', {
          method: 'POST',
          body: JSON.stringify({ name, groupKey })
        });
        location.reload();
      } catch (err) {
        alert(err.message);
      }
    };

    // Join Group Logic
    document.getElementById('confirmJoin').onclick = async () => {
      const name = document.getElementById('joinGroupName').value.trim();
      const groupKey = document.getElementById('joinGroupKey').value.trim();
      if (!name || !groupKey) return alert('Fill all fields');

      try {
        await fetchAPI('/groups/join', {
          method: 'POST',
          body: JSON.stringify({ name, groupKey })
        });
        location.reload();
      } catch (err) {
        alert(err.message);
      }
    };

    function openVerificationModal(targetUser) {
      selectedUser = targetUser;
      modalTargetName.textContent = targetUser.username;
      modalPassword.value = '';
      modalError.style.display = 'none';
      verificationModal.classList.add('active');
      modalPassword.focus();
    }

    function closeVerificationModal() {
      verificationModal.classList.remove('active');
      selectedUser = null;
    }

    cancelVerify.addEventListener('click', closeVerificationModal);

    confirmVerify.addEventListener('click', async () => {
      const password = modalPassword.value.trim();
      if (!password) return;

      try {
        confirmVerify.disabled = true;
        const data = await fetchAPI('/verify-chat-password', {
          method: 'POST',
          body: JSON.stringify({ targetUserId: selectedUser._id, chatPassword: password })
        });
        sessionStorage.setItem(`chatToken_${selectedUser._id}`, data.chatToken);
        window.location.href = `chat.html?target=${selectedUser._id}&name=${encodeURIComponent(selectedUser.username)}`;
      } catch (err) {
        modalError.textContent = err.message || 'Verification failed';
        modalError.style.display = 'block';
      } finally {
        confirmVerify.disabled = false;
      }
    });

    function createGroupCard(group) {
      const div = document.createElement('div');
      div.className = 'group-card';
      div.innerHTML = `
        <div class="group-info">
          <div class="group-avatar">${group.name.charAt(0).toUpperCase()}</div>
          <div>
            <div class="group-name">${group.name}</div>
            <div class="group-members">${group.members.length} members</div>
          </div>
        </div>
        <button class="btn-join">
          <i class="fas fa-comments"></i> Enter
        </button>
      `;
      div.onclick = () => {
        window.location.href = `chat.html?groupId=${group._id}&name=${encodeURIComponent(group.name)}`;
      };
      return div;
    }

    function createUserCard(targetUser) {
      const div = document.createElement('div');
      div.className = 'user-card';
      div.innerHTML = `
        <div class="user-info">
          <div class="user-avatar">${targetUser.username.charAt(0).toUpperCase()}</div>
          <div class="user-name">${targetUser.username}</div>
        </div>
        <button class="btn-message">
          <i class="fas fa-paper-plane"></i> Message
        </button>
      `;
      div.onclick = () => openVerificationModal(targetUser);
      return div;
    }

    async function loadContent() {
      try {
        // Load Groups
        const groupsList = document.getElementById('groupsList');
        const groups = await fetchAPI('/groups');
        groupsList.innerHTML = '';
        if (groups.length === 0) {
          groupsList.innerHTML = '<div class="no-results">No groups joined yet.</div>';
        } else {
          groups.forEach(g => groupsList.appendChild(createGroupCard(g)));
        }

        // Load Recent Chats
        const users = await fetchAPI('/recent');
        const suggestedList = document.getElementById('suggestedList');
        const suggestionTitle = document.querySelector('.section-title[data-section="suggestions"]');
        if (suggestionTitle) suggestionTitle.textContent = 'Recent';
        
        suggestedList.innerHTML = '';
        if (users.length === 0) {
          suggestedList.innerHTML = '<div class="no-results" style="grid-column: 1/-1;">No recent chats yet. Start searching to chat!</div>';
        } else {
          users.forEach(u => suggestedList.appendChild(createUserCard(u)));
        }
      } catch (err) {
        console.error(err);
      }
    }

    loadContent();

    // Search Logic (Simplified)
    const searchInput = document.getElementById('searchInput');
    const resultsArea = document.getElementById('resultsArea');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', async (e) => {
      const query = e.target.value.trim();
      if (!query) {
        resultsArea.classList.remove('active');
        return;
      }
      resultsArea.classList.add('active');
      const users = await fetchAPI(`/search-users?query=${encodeURIComponent(query)}`);
      searchResults.innerHTML = '';
      users.forEach(u => searchResults.appendChild(createUserCard(u)));
    });
  </script>
</body>
</html>
