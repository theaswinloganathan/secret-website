<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Search Users</title>
  <link rel="stylesheet" href="css/style.css?v=0.2.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Dark overlay for readability */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .search-app-container {
      max-width: 600px;
      width: 90%;
      margin: 20px auto;
      z-index: 10;
      position: relative;
    }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .search-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: white;
    }

    .btn-icon i {
      font-size: 1.1rem;
    }

    .btn-chat {
      color: var(--primary-color);
      border-color: rgba(0, 242, 254, 0.3);
    }
    
    .btn-chat:hover {
      background: rgba(0, 242, 254, 0.1);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      transform: translateY(-2px);
    }

    .btn-logout {
      color: var(--error-color);
      border-color: rgba(255, 51, 102, 0.3);
    }

    .btn-logout:hover {
      background: rgba(255, 51, 102, 0.1);
      box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
      transform: translateY(-2px);
    }

    /* Large Rounded Search Bar */
    .search-bar-wrapper {
      position: relative;
      margin-bottom: 30px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(15px);
      transition: all 0.4s ease;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .search-bar-wrapper:focus-within {
      border-color: var(--primary-color);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
      transform: scale(1.02);
    }

    .search-icon {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.2rem;
      transition: all 0.3s ease;
      z-index: 2;
    }

    .search-bar-wrapper:focus-within .search-icon {
      color: var(--primary-color);
      text-shadow: 0 0 10px var(--primary-color);
    }

    .search-clear {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      display: none;
      z-index: 2;
    }

    .search-clear:hover {
      color: var(--error-color);
      transform: translateY(-50%) scale(1.1);
    }

    .search-input {
      width: 100%;
      padding: 20px 50px 20px 60px;
      font-size: 1.1rem;
      color: white;
      background: transparent;
      border: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    
    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-glow {
      position: absolute;
      bottom: 0; left: 50%;
      width: 0; height: 2px;
      background: var(--primary-color);
      transition: all 0.4s ease;
      transform: translateX(-50%);
    }

    .search-bar-wrapper:focus-within .search-glow {
      width: 100%;
    }

    /* User Cards Container */
    .results-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      min-height: 200px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .results-container.active {
      display: block;
    }

    .section-title {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      margin-left: 10px;
    }

    /* User Cards */
    .user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      border-radius: 15px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .user-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--glass-border);
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: #050510;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
    }

    .btn-message {
      background: rgba(0, 242, 254, 0.1);
      color: var(--primary-color);
      border: 1px solid rgba(0, 242, 254, 0.2);
      border-radius: 50px;
      padding: 8px 15px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .user-card:hover .btn-message {
      background: var(--primary-color);
      color: #050510;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .no-results {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .no-results i {
      font-size: 2rem;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 35px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      text-align: center;
      position: relative;
      animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalSlide {
      from { transform: translateY(30px) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal-content h3 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-content p {
      color: var(--text-muted);
      margin-bottom: 25px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .modal-content p b {
      color: var(--primary-color);
      font-weight: 600;
    }

    .modal-input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .modal-input {
      width: 100%;
      padding: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      color: white;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      letter-spacing: 3px;
    }

    .modal-input:focus {
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
    }

    .modal-actions {
      display: flex;
      gap: 15px;
    }

    .btn-modal {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-verify {
      background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
      color: white;
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
    }

    .btn-verify:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(112, 0, 255, 0.5);
    }

    .btn-verify:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .modal-error {
      color: var(--error-color);
      font-size: 0.85rem;
      margin-top: -12px;
      margin-bottom: 20px;
      display: none;
      font-weight: 600;
      background: rgba(255, 51, 102, 0.1);
      padding: 8px;
      border-radius: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="search-app-container">
    <div class="search-header">
      <h2 class="search-title">Discover</h2>
      <div class="action-buttons">
        <a href="chat.html" class="btn-icon btn-chat">
          <i class="far fa-comment-dots"></i> <span>Chat</span>
        </a>
        <button onclick="logout()" class="btn-icon btn-logout">
          <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
      </div>
    </div>
    
    <div class="search-bar-wrapper">
      <i class="fas fa-search search-icon" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search by username..." autocomplete="off">
      <i class="fas fa-times-circle search-clear" id="searchClear"></i>
      <div class="search-glow"></div>
    </div>

    <!-- Suggested Users Area -->
    <div id="suggestedArea" class="results-container active">
      <div class="section-title">Suggested Users</div>
      <div id="suggestedList">
        <div class="no-results">
          <i class="fas fa-spinner fa-spin"></i>
          <div>Loading suggestions...</div>
        </div>
      </div>
    </div>

    <!-- Search Results Area -->
    <div id="resultsArea" class="results-container">
      <div class="section-title">Search Results</div>
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- Verification Modal -->
  <div id="verificationModal" class="modal-overlay">
    <div class="modal-content">
      <h3>Verify Access</h3>
      <p>Please enter the chat password for <br><b id="modalTargetName">User</b> to start the conversation.</p>
      
      <div id="modalError" class="modal-error">Invalid password. Please try again.</div>
      
      <div class="modal-input-wrapper">
        <input type="password" id="modalPassword" class="modal-input" placeholder="••••••••" autocomplete="off">
      </div>
      
      <div class="modal-actions">
        <button id="cancelVerify" class="btn-modal btn-cancel">Cancel</button>
        <button id="confirmVerify" class="btn-modal btn-verify">
          <i class="fas fa-shield-alt"></i> <span>Verify</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=0.2.0"></script>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    let selectedUser = null;

    // Modal Elements
    const verificationModal = document.getElementById('verificationModal');
    const modalTargetName = document.getElementById('modalTargetName');
    const modalPassword = document.getElementById('modalPassword');
    const modalError = document.getElementById('modalError');
    const confirmVerify = document.getElementById('confirmVerify');
    const cancelVerify = document.getElementById('cancelVerify');

    function openVerificationModal(user) {
      selectedUser = user;
      modalTargetName.textContent = user.username;
      modalPassword.value = '';
      modalError.style.display = 'none';
      verificationModal.classList.add('active');
      modalPassword.focus();
    }

    function closeVerificationModal() {
      verificationModal.classList.remove('active');
      selectedUser = null;
    }

    cancelVerify.addEventListener('click', closeVerificationModal);

    confirmVerify.addEventListener('click', async () => {
      const password = modalPassword.value.trim();
      if (!password) return;

      try {
        confirmVerify.disabled = true;
        confirmVerify.querySelector('span').textContent = 'Verifying...';
        confirmVerify.querySelector('i').className = 'fas fa-spinner fa-spin';
        modalError.style.display = 'none';

        const data = await fetchAPI('/verify-chat-password', {
          method: 'POST',
          body: JSON.stringify({ 
            targetUserId: selectedUser._id, 
            chatPassword: password 
          })
        });

        // Save token to sessionStorage so chat.html can use it immediately
        sessionStorage.setItem(`chatToken_${selectedUser._id}`, data.chatToken);
        
        // Success animation or direct navigation
        confirmVerify.querySelector('i').className = 'fas fa-check-circle';
        confirmVerify.querySelector('span').textContent = 'Verified!';
        
        setTimeout(() => {
          window.location.href = `chat.html?target=${selectedUser._id}&name=${encodeURIComponent(selectedUser.username)}`;
        }, 50);

      } catch (err) {
        console.error(err);
        modalError.textContent = err.message || 'Verification failed. Try again.';
        modalError.style.display = 'block';
        confirmVerify.querySelector('i').className = 'fas fa-shield-alt';
        confirmVerify.querySelector('span').textContent = 'Verify';
      } finally {
        confirmVerify.disabled = false;
      }
    });

    // Handle Enter key in modal
    modalPassword.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') confirmVerify.click();
    });

    // Function to render user cards
    function createUserCard(user) {
      const div = document.createElement('div');
      div.className = 'user-card';
      div.innerHTML = `
        <div class="user-info">
          <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
          <div class="user-name">${user.username}</div>
        </div>
        <button class="btn-message">
          <i class="fas fa-paper-plane"></i> Message
        </button>
      `;
      div.onclick = () => {
        openVerificationModal(user);
      };
      return div;
    }

    // Load suggested users on startup
    async function loadSuggestedUsers() {
      try {
        // Querying a common character to fetch some user suggestions
        const query = 'a'; 
        const users = await fetchAPI(`/search-users?query=${encodeURIComponent(query)}`);
        const suggestedList = document.getElementById('suggestedList');
        suggestedList.innerHTML = '';
        
        // Take up to 4 users for suggestions
        const suggestions = users.slice(0, 4);
        
        if (suggestions.length === 0) {
          suggestedList.innerHTML = `
            <div class="no-results">
              <i class="fas fa-user-friends"></i>
              <div>No suggestions available right now.</div>
            </div>`;
          return;
        }

        suggestions.forEach(user => {
          suggestedList.appendChild(createUserCard(user));
        });
      } catch (err) {
        console.error(err);
        document.getElementById('suggestedList').innerHTML = `
          <div class="no-results" style="color: var(--error-color);">
            <i class="fas fa-exclamation-circle"></i>
            <div>Failed to load suggestions.</div>
          </div>`;
      }
    }

    // Initialize suggestions
    loadSuggestedUsers();

    let searchTimeout;
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const searchIcon = document.getElementById('searchIcon');
    const suggestedArea = document.getElementById('suggestedArea');
    const resultsArea = document.getElementById('resultsArea');
    const searchResults = document.getElementById('searchResults');

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      triggerSearch('');
    });

    searchInput.addEventListener('input', (e) => {
      triggerSearch(e.target.value.trim());
    });

    function triggerSearch(query) {
      clearTimeout(searchTimeout);
      
      if (!query) {
        searchClear.style.display = 'none';
        searchIcon.classList.remove('fa-spin', 'fa-spinner');
        searchIcon.classList.add('fa-search');
        // Show suggestions, hide results
        suggestedArea.classList.add('active');
        resultsArea.classList.remove('active');
        searchResults.innerHTML = '';
        return;
      }

      searchClear.style.display = 'block';

      searchTimeout = setTimeout(async () => {
        try {
          // Show results, hide suggestions
          suggestedArea.classList.remove('active');
          resultsArea.classList.add('active');
          
          // Switch icon to spinner while searching
          searchIcon.classList.remove('fa-search');
          searchIcon.classList.add('fa-spinner', 'fa-spin');

          const users = await fetchAPI(`/search-users?query=${encodeURIComponent(query)}`);
          
          // Switch icon back
          searchIcon.classList.remove('fa-spinner', 'fa-spin');
          searchIcon.classList.add('fa-search');

          searchResults.innerHTML = '';
          
          if (users.length === 0) {
             searchResults.innerHTML = `
              <div class="no-results">
                <i class="fas fa-search-minus" style="font-size: 3rem; display: block; margin-bottom: 20px;"></i>
                <div style="font-size: 1.2rem; font-weight: 600;">No users found</div>
                <div style="color: var(--text-muted); margin-top: 5px;">Try searching for someone else</div>
              </div>`;
             return;
          }

          users.forEach(user => {
            searchResults.appendChild(createUserCard(user));
          });

          // Handle Enter key to pick the first result
          const enterHandler = (e) => {
            if (e.key === 'Enter' && users.length > 0) {
              openVerificationModal(users[0]);
              searchInput.removeEventListener('keydown', enterHandler);
            }
          };
          
          // Remove old listener if any and add new one
          searchInput.removeEventListener('keydown', searchInput._enterHandler);
          searchInput._enterHandler = enterHandler;
          searchInput.addEventListener('keydown', searchInput._enterHandler);

        } catch (err) {
          console.error(err);
          searchIcon.classList.remove('fa-spinner', 'fa-spin');
          searchIcon.classList.add('fa-search');
          searchResults.innerHTML = `
            <div class="no-results" style="color: var(--error-color);">
              <i class="fas fa-exclamation-triangle"></i>
              <div>An error occurred during search.</div>
            </div>`;
        }
      }, 150);
    }
  </script>
</body>
</html>
