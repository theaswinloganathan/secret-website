<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign Up - Private Chat</title>
  <link rel="stylesheet" href="css/style.css?v=0.1.5">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="particles-container" id="particles"></div>

  <div class="glass-card" id="signupCard">
    <div class="branding">
      <h1 style="font-weight: 400; font-size: 1.8rem; background: unset; -webkit-text-fill-color: #fff; letter-spacing: normal;">Sign Up</h1>
    </div>

    <div id="errorMsg" class="error-message"></div>

    <form id="signupForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="Username" required style="background: rgba(255,255,255,0.15); border: none; border-radius: 8px; padding: 12px 15px; font-size: 0.95rem;">
      </div>

      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Login Password" required style="background: rgba(255,255,255,0.15); border: none; border-radius: 8px; padding: 12px 15px; font-size: 0.95rem;">
      </div>

      <div class="input-group">
        <input type="password" id="chatPassword" placeholder="Chat Password" required style="background: rgba(255,255,255,0.15); border: none; border-radius: 8px; padding: 12px 15px; font-size: 0.95rem;">
      </div>
      
      <p style="font-size: 0.75rem; color: #a0a0c0; text-align: left; margin-top: -15px; margin-bottom: 20px; line-height: 1.4;">Chat password is required to approve inbound messages from others.</p>

      <button type="submit" id="submitBtn" class="btn-primary" style="background: rgba(255,255,255,0.15); box-shadow: none; border: 1px solid rgba(0, 242, 254, 0.5); color: #00f2fe; text-transform: uppercase;">
        <span>SIGN UP</span>
      </button>
    </form>

    <div class="form-footer" style="margin-top: 20px; color: #fff;">
      <p>Already have an account? <a href="index.html" style="color: #00f2fe;">Login</a></p>
    </div>
  </div>

  <script src="js/api.js?v=0.1.5"></script>
  <script>
    // Step Navigation logic
    function goToStep(stepNumber) {
      document.querySelectorAll('.signup-step').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.step-dot').forEach((d, i) => {
        if (i < stepNumber) d.classList.add('active');
        else d.classList.remove('active');
      });
      document.getElementById('step' + stepNumber).classList.add('active');
    }

    // Password Toggle
    function togglePass(id, el) {
      const input = document.getElementById(id);
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      el.textContent = type === 'password' ? '👁️' : '🙈';
    }

    // Password Strength Meter
    document.getElementById('loginPassword').addEventListener('input', function(e) {
      const val = e.target.value;
      const bar = document.getElementById('strengthBar');
      let strength = 0;
      if (val.length > 5) strength += 33;
      if (/[A-Z]/.test(val)) strength += 33;
      if (/[0-9]/.test(val)) strength += 34;
      
      bar.style.width = strength + '%';
      if (strength < 40) bar.style.background = '#ff3366';
      else if (strength < 80) bar.style.background = '#ffcc00';
      else bar.style.background = '#00ff88';
    });

    // Ripple Effect
    document.querySelectorAll('.btn-primary').forEach(button => {
      button.addEventListener('click', function(e) {
        let ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = (e.clientX - e.target.offsetLeft) + 'px';
        ripple.style.top = (e.clientY - e.target.offsetTop) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // Particles
    const particles = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.style.cssText = `position:absolute; width:${Math.random()*5}px; height:5px; background:rgba(255,255,255,0.1); border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; animation: floatBG ${Math.random()*5+5}s infinite ease-in-out;`;
      particles.appendChild(p);
    }

    // Register Logic
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const loginPassword = document.getElementById('loginPassword').value;
      const chatPassword = document.getElementById('chatPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');
      const card = document.getElementById('signupCard');

      try {
        submitBtn.disabled = true;
        submitBtn.querySelector('span').textContent = 'Generating Access...';
        errorMsg.style.display = 'none';

        await fetchAPI('/register', {
          method: 'POST',
          body: JSON.stringify({ username, loginPassword, chatPassword })
        });

        alert('Access Generated Successfully. Redirecting to Terminal...');
        card.classList.add('fade-out');
        setTimeout(() => window.location.href = 'index.html', 400);
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
      } finally {
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = 'Activate Access';
      }
    });
  </script>
</body>
</html>
