<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <link rel="stylesheet" href="css/style.css?v=0.1.7">
  <script src="https://secret-website-6ggb.onrender.com/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/emoji-picker-element@1"></script>
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <span id="myUsername">Chat</span>
        <div>
          <a href="search.html" style="margin-right: 10px; font-size: 0.8em;">Search</a>
          <a href="#" onclick="logout()" style="font-size: 0.8em; color: var(--error-color);">Logout</a>
        </div>
      </div>
      <div class="user-list" id="sidebarList" style="padding: 10px; text-align: center; color: var(--text-muted);">
        Use <a href="search.html">Search</a> to find users to chat with.
      </div>
    </div>
    
    <div class="chat-area" id="chatArea" style="display: none;">
      <div class="chat-header">
        <button id="backBtn" class="icon-btn">←</button>
        <div id="chatTargetName" style="flex: 1; margin-left: 10px; font-weight: bold;">Chat</div>
      </div>
      
      <div id="messagesContainer" class="messages-container"></div>
      <div class="message-input" style="position: relative;">
        <button type="button" id="emojiBtn" style="padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: rgba(0,0,0,0.2); border: none;">😊</button>
        <button type="button" id="photoBtn" style="padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: rgba(0,0,0,0.2); border: none; margin-left: 5px;" title="Camera">📷</button>
        <button type="button" id="galleryBtn" style="padding: 10px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: rgba(0,0,0,0.2); border: none; margin-left: 5px;" title="Gallery">🖼️</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
        <emoji-picker id="emojiPicker" style="position: absolute; bottom: 85px; left: 20px; display: none; z-index: 1000; --background: var(--glass-bg); --border-color: var(--glass-border); --text-color: var(--text-color);"></emoji-picker>
      </div>
    </div>
    <div class="chat-area" id="placeholderArea" style="justify-content: center; align-items: center;">
      <h3 style="color: var(--text-muted)">Select a user to start chatting</h3>
    </div>
  </div>

  <div id="passwordModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 style="text-align: center; margin-bottom: 15px;">Verify Access</h3>
      <p style="font-size: 0.9em; margin-bottom: 15px; color: var(--text-muted);">
        Enter <span id="targetNameHighlight"></span>'s chat password to start conversation.
      </p>
      <div id="modalErrorMsg" class="error-message"></div>
      <input type="password" id="targetChatPassword" placeholder="Their Chat Password" style="margin-bottom: 15px;">
      <button id="verifyBtn" style="width: 100%;">Verify</button>
    </div>
  </div>

  <!-- Camera Modal -->
  <div id="cameraModal" class="modal-overlay hidden">
    <div class="camera-container">
      <div class="camera-header">
        <button id="closeCameraBtn" class="icon-btn">✕</button>
        <span id="cameraTitle">Camera</span>
        <button id="flipCameraBtn" class="icon-btn">🔄</button>
      </div>
      <div class="camera-viewport">
        <video id="cameraVideo" autoplay playsinline title="Camera Preview"></video>
        <canvas id="cameraCanvas" style="display: none;"></canvas>
      </div>
      <div class="camera-footer">
        <button id="captureBtn" class="capture-button"></button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=0.1.3"></script>
  <script src="js/chat.js?v=0.1.3"></script>
  <script src="js/camera.js?v=0.1.3"></script>
</body>
</html>
