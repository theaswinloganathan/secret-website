<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <link rel="stylesheet" href="css/style.css?v=0.2.0">
  <script src="https://secret-website-6ggb.onrender.com/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/emoji-picker-element@1"></script>
</head>
<body>
  <style>
    body {
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 5, 16, 0.85); /* Dark tint to keep text readable */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.08), transparent 40%);
      z-index: -1;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      border-left: 1px solid var(--glass-border);
      border-right: 1px solid var(--glass-border);
      position: relative;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    /* Minimal Header */
    .chat-header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-3px);
    }

    .header-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #050510;
      font-size: 1.1rem;
    }

    .header-user-name {
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    /* Messages Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      width: 100%;
    }

    .messages-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Subtle pattern */
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    /* Modern Bubbles */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 20px;
      position: relative;
      font-size: 0.95rem;
      line-height: 1.4;
      animation: msgPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
    }

    .message-time {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-top: 4px;
      align-self: flex-end;
    }

    .message.sent .message-time {
      color: rgba(0, 0, 0, 0.6);
    }

    .message.received .message-time {
      color: rgba(255, 255, 255, 0.5);
    }

    @keyframes msgPop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(0, 242, 254, 0.2), rgba(79, 172, 254, 0.1));
      border: 1px solid rgba(0, 242, 254, 0.3);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: #e0e0f0;
      border-bottom-left-radius: 4px;
    }

    .message-content-wrapper img {
      width: 100%;
      max-width: 300px;
      border-radius: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: transform 0.2s;
      display: block;
    }

    .message-content-wrapper img:hover {
      transform: scale(1.02);
    }

    .image-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .img-action-btn {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .img-action-btn:hover {
      color: var(--primary-color);
    }

    .status-ticks {
      font-size: 0.7rem;
      text-align: right;
      margin-top: 4px;
      opacity: 0.7;
    }

    .status-ticks.seen {
      color: var(--primary-color);
    }

    .msg-delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: var(--error-color);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
    }

    .message:hover .msg-delete-btn {
      display: flex;
    }

    /* Input Bar */
    .message-input-container {
      padding: 15px 20px 30px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-actions {
      display: flex;
      gap: 8px;
      padding-bottom: 5px;
    }

    .action-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.1rem;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--primary-color);
      transform: translateY(-2px);
    }

    /* Fix Camera Modal Z-Index and Style */
    #cameraModal {
      backdrop-filter: blur(25px);
    }

    .camera-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
    }

    .camera-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .camera-viewport {
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #000;
      border: 1px solid var(--glass-border);
    }

    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .main-input-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    #messageInput:focus {
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    #sendBtn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      color: #050510;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    }

    #sendBtn:hover {
      transform: scale(1.05) rotate(-10deg);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
    }

    #sendBtn:active {
      transform: scale(0.95);
    }

    /* Modal Tweaks */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 30px;
      border-radius: 24px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .hidden { display: none !important; }

    .placeholder-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .placeholder-view i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.2;
    }

    /* --- CHAT PAGE RESPONSIVENESS --- */
    @media (max-width: 768px) {
      body {
        height: auto;
        min-height: 100dvh;
      }

      .app-container {
        max-width: 100%;
        height: 100dvh;
        border: none;
      }

      .chat-header {
        padding: 10px 15px;
        gap: 10px;
      }

      .header-avatar {
        width: 35px;
        height: 35px;
        font-size: 1rem;
      }

      .header-user-name {
        font-size: 1rem;
      }

      #ghostToggle span {
        display: none;
      }

      .message {
        max-width: 90%;
        font-size: 0.9rem;
        padding: 10px 14px;
      }

      .message-input-container {
        padding: 10px 15px 25px 15px; /* Extra bottom padding for mobile home bars */
        gap: 10px;
        flex-direction: column;
      }

      .input-actions {
        width: 100%;
        justify-content: flex-start;
        gap: 15px;
      }

      .main-input-wrapper {
        width: 100%;
      }

      #messageInput {
        padding: 12px 15px;
        font-size: 1rem;
      }

      #sendBtn {
        width: 45px;
        height: 45px;
        font-size: 1.1rem;
      }
      
      .placeholder-view {
        padding: 20px;
      }
      
      .placeholder-view i {
        font-size: 3rem;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="bg-overlay"></div>
  
  <div class="app-container">
    <!-- Chat Area (Visible when user is selected) -->
    <div class="chat-area" id="chatArea" style="display: none;">
      <div class="chat-header">
        <a href="search.html" class="back-btn" title="Back to Search">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div class="header-info">
          <div style="position: relative;">
            <div class="header-avatar" id="headerAvatar">?</div>
            <div id="selfGhostBadge" class="ghost-badge">👻</div>
          </div>
          <div class="header-user-name" id="chatTargetName">Chat</div>
          <button id="ghostToggle" title="Toggle Ghost Mode">
            <i class="fas fa-ghost"></i> <span>Ghost Mode</span>
          </button>
        </div>
        <button onclick="logout()" class="back-btn" title="Logout" style="color: var(--error-color);">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
      
      <div id="messagesContainer" class="messages-container"></div>
      
      <div class="message-input-container">
        <div class="input-actions">
          <button type="button" id="emojiBtn" class="action-btn" title="Emojis">😊</button>
          <button type="button" id="photoBtn" class="action-btn" title="Camera"><i class="fas fa-camera"></i></button>
          <button type="button" id="galleryBtn" class="action-btn" title="Gallery"><i class="fas fa-image"></i></button>
          <div class="timer-picker-container">
            <button type="button" id="timerBtn" class="action-btn" title="Disappearing Messages"><i class="fas fa-history"></i></button>
            <div id="timerDropdown" class="timer-dropdown">
              <div class="timer-option active" data-value="0">Off</div>
              <div class="timer-option" data-value="1">1 Hour</div>
              <div class="timer-option" data-value="24">24 Hours</div>
              <div class="timer-option" data-value="168">7 Days</div>
            </div>
          </div>
        </div>
        
        <div class="main-input-wrapper">
          <input type="file" id="fileInput" accept="image/*" style="display: none;">
          <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
          <emoji-picker id="emojiPicker" style="position: absolute; bottom: 70px; left: 0; display: none; z-index: 1000; --background: var(--bg-dark); --border-color: var(--glass-border); --text-color: var(--text-color);"></emoji-picker>
        </div>
        
        <button id="sendBtn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Placeholder View (Visible when no user is selected) -->
    <div class="placeholder-view" id="placeholderArea">
      <i class="fas fa-comments"></i>
      <h3>Private Workspace</h3>
      <p>Select a user from <a href="search.html" style="color: var(--primary-color);">Search</a> to begin.</p>
    </div>
  </div>

  <!-- Camera Modal -->
  <div id="cameraModal" class="modal-overlay hidden">
    <div class="camera-container">
      <div class="camera-header">
        <button id="closeCameraBtn" class="icon-btn">✕</button>
        <span id="cameraTitle">Camera</span>
        <button id="flipCameraBtn" class="icon-btn">🔄</button>
      </div>
      <div class="camera-viewport">
        <video id="cameraVideo" autoplay playsinline title="Camera Preview"></video>
        <canvas id="cameraCanvas" style="display: none;"></canvas>
      </div>
      <div class="camera-footer">
        <button id="captureBtn" class="capture-button"></button>
      </div>
    </div>
  </div>

  <!-- Message Info Bottom Sheet -->
  <div id="messageInfoSheet" class="bottom-sheet-overlay">
    <div class="bottom-sheet">
      <div class="sheet-header">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Message info</div>
      </div>
      
      <div class="sheet-section">
        <div class="section-head">Seen by</div>
        <div id="seenByList" class="info-user-list">
          <!-- List users who have seen it -->
        </div>
      </div>

      <div class="sheet-section">
        <div class="section-head">Not seen yet</div>
        <div id="notSeenList" class="info-user-list">
          <!-- List users who haven't seen it -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=0.2.0"></script>
  <script src="js/chat.js?v=0.2.0"></script>
  <script src="js/camera.js?v=0.2.0"></script>
</body>
</html>
